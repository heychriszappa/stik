name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Import Apple signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain

      - name: Build DarwinKit sidecar (per-arch)
        # Builds each architecture in a separate `swift build` invocation
        # so we stay on native SwiftPM instead of `--arch arm64 --arch
        # x86_64` which routes through Xcode's xcbuild. xcbuild on the
        # current macos-latest runner (Xcode 16.4) can't parse the
        # swift-collections 1.x `_RopeModule` manifest and exits non-zero
        # even though the actual build succeeds. Native SwiftPM parses
        # the same manifest fine, so splitting into two single-arch
        # builds sidesteps the problem entirely. Each tauri-action step
        # below only consumes one arch so there's no need to lipo them
        # back together.
        run: |
          cd src-tauri/darwinkit
          mkdir -p ../binaries

          swift build -c release --arch arm64
          cp .build/arm64-apple-macosx/release/darwinkit ../binaries/darwinkit-aarch64-apple-darwin

          swift build -c release --arch x86_64
          cp .build/x86_64-apple-macosx/release/darwinkit ../binaries/darwinkit-x86_64-apple-darwin

          file ../binaries/darwinkit-aarch64-apple-darwin
          file ../binaries/darwinkit-x86_64-apple-darwin

      - name: Install protobuf compiler
        run: brew install protobuf

      - name: Install npm dependencies
        run: npm ci

      - name: Remove bun to prevent tauri-action misdetection
        run: brew uninstall --ignore-dependencies bun || true

      - name: Build and release (aarch64)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
        with:
          tauriScript: npm run tauri
          tagName: v__VERSION__
          releaseName: 'Stik v__VERSION__'
          releaseBody: 'See [CHANGELOG](https://github.com/0xMassi/stik_app/blob/main/CHANGELOG.md) for details.'
          releaseDraft: true
          prerelease: false
          # --bundles app,updater: skip tauri-bundler's bundle_dmg.sh
          # which dies ~10s into AppleScript icon positioning on the
          # current runner. We build the DMG ourselves in a later step.
          args: --target aarch64-apple-darwin --bundles app,updater

      - name: Build and release (x86_64)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
        with:
          tauriScript: npm run tauri
          tagName: v__VERSION__
          releaseName: 'Stik v__VERSION__'
          releaseDraft: true
          prerelease: false
          args: --target x86_64-apple-darwin --bundles app,updater

      - name: Build signed DMGs and upload to release
        # Tauri's bundle_dmg.sh / hdiutil / AppleScript pipeline keeps
        # flaking on the ephemeral macOS runner. Build DMGs ourselves
        # with a single `hdiutil create` per arch: simple, deterministic,
        # fully visible in the logs. Each DMG is signed with the same
        # Developer ID identity the tauri-action step used and uploaded
        # to the existing draft release so the downstream Homebrew step
        # can find them via `gh release download --pattern "*.dmg"`.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          for PAIR in "aarch64-apple-darwin:aarch64" "x86_64-apple-darwin:x64"; do
            RUST_TARGET="${PAIR%%:*}"
            DMG_ARCH="${PAIR##*:}"
            APP_PATH="src-tauri/target/${RUST_TARGET}/release/bundle/macos/Stik.app"
            DMG_NAME="Stik_${VERSION}_${DMG_ARCH}.dmg"
            DMG_PATH="${RUNNER_TEMP}/${DMG_NAME}"

            if [ ! -d "$APP_PATH" ]; then
              echo "::error::Expected .app not found at $APP_PATH"
              ls -la "$(dirname "$APP_PATH")" || true
              exit 1
            fi

            echo "==> Creating $DMG_NAME from $APP_PATH"
            hdiutil create \
              -volname "Stik" \
              -srcfolder "$APP_PATH" \
              -ov -format UDZO \
              "$DMG_PATH"

            echo "==> Signing $DMG_NAME"
            codesign --sign "$APPLE_SIGNING_IDENTITY" --timestamp "$DMG_PATH"
            codesign --verify --verbose=2 "$DMG_PATH"

            echo "==> Uploading $DMG_NAME to draft release"
            gh release upload "v${VERSION}" "$DMG_PATH" --clobber
          done

      - name: Update Homebrew tap
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          # Download DMGs using repo-scoped GITHUB_TOKEN
          GH_TOKEN="$GITHUB_TOKEN" gh release download "$GITHUB_REF_NAME" --pattern "*.dmg" --dir "$RUNNER_TEMP"
          SHA_ARM=$(shasum -a 256 "$RUNNER_TEMP/Stik_${VERSION}_aarch64.dmg" | cut -d' ' -f1)
          SHA_INTEL=$(shasum -a 256 "$RUNNER_TEMP/Stik_${VERSION}_x64.dmg" | cut -d' ' -f1)

          # Generate updated cask formula
          cat > "$RUNNER_TEMP/stik.rb" <<CASKEOF
          cask "stik" do
            arch arm: "aarch64", intel: "x64"

            version "${VERSION}"
            sha256 arm:   "${SHA_ARM}",
                   intel: "${SHA_INTEL}"

            url "https://github.com/0xMassi/stik_app/releases/download/v#{version}/Stik_#{version}_#{arch}.dmg"
            name "Stik"
            desc "Instant thought capture - one shortcut, post-it appears, type, close"
            homepage "https://github.com/0xMassi/stik_app"

            depends_on macos: ">= :catalina"

            app "Stik.app"

            zap trash: [
              "~/Documents/Stik",
              "~/.stik",
              "~/Library/Caches/com.stik.app",
              "~/Library/WebKit/com.stik.app",
            ]
          end
          CASKEOF

          # Base64-encode the cask content
          CONTENT=$(base64 -i "$RUNNER_TEMP/stik.rb")

          # Get current file SHA from GitHub API (needed for update)
          FILE_SHA=$(GH_TOKEN="$HOMEBREW_TAP_TOKEN" gh api repos/0xMassi/homebrew-stik/contents/Casks/stik.rb --jq '.sha')

          # Push updated cask to tap repo
          GH_TOKEN="$HOMEBREW_TAP_TOKEN" gh api repos/0xMassi/homebrew-stik/contents/Casks/stik.rb \
            --method PUT \
            -f message="Update Stik to v${VERSION}" \
            -f sha="$FILE_SHA" \
            -f content="$CONTENT"

      - name: Trigger landing page rebuild
        if: success()
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: curl -s -X POST "$VERCEL_DEPLOY_HOOK"
